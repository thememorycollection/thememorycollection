
<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <meta charset="UTF-8">
  <title>Preview Tribute</title>
  <link rel="stylesheet" href="tribute.css">
  <script src="crypto.js"></script>
</head>
<body>

<div id="passwordPrompt" style="display:none;">
  <h2>This tribute is password protected</h2>
  <input id="passwordEntry" type="password" placeholder="Enter password">
  <button onclick="unlock()">Unlock</button>
</div>

<div id="previewContent" style="display:none;">
  <h1 id="name"></h1>
  <h2 id="dates"></h2>
  <p id="message"></p>
  <div id="photos"></div>

  <button onclick="sendToSeller()">Send to Seller</button>
</div>

<div id="passwordModal">
  <div id="passwordBox">
    <h2>Enter Password</h2>
    <input id="passwordEntry" type="password" placeholder="Password">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<script>
const encrypted = decodeURIComponent(window.location.hash.substring(1));
let decrypted;

// Try base64 first (no password)
try {
    decrypted = JSON.parse(atob(encrypted));
    showTribute(decrypted);
} catch {
    // If base64 fails → encrypted with password
    document.getElementById("passwordModal").classList.add("show");
}

function unlock() {
    const password = document.getElementById("passwordEntry").value;

    try {
        const bytes = CryptoJS.AES.decrypt(encrypted, password);
        const text = bytes.toString(CryptoJS.enc.Utf8);

        if (!text) throw new Error("Bad password");

        decrypted = JSON.parse(text);
        document.getElementById("passwordModal").classList.remove("show");
        showTribute(decrypted);

    } catch {
        alert("Incorrect password");
    }
}

function showTribute(data) {
    document.getElementById("name").textContent = data.name;
    document.getElementById("dates").textContent = data.dates;
    document.getElementById("message").textContent = data.message;

    const container = document.getElementById("photos");
    data.photos.forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        container.appendChild(img);
    });
}
</script>

</body>
</html>
