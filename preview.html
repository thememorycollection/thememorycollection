<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preview Tribute – TheMemoryCollection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="tribute.css">

  <!-- CryptoJS must load BEFORE tribute.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="tribute.js"></script>
</head>

<body>

<!-- PASSWORD MODAL -->
<div id="passwordModal">
  <div id="passwordBox">
    <h2>Enter Password</h2>
    <input id="passwordEntry" type="password" placeholder="Password">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<!-- TRIBUTE CONTENT -->
<div id="tributeWrapper">
  <h1 id="name"></h1>
  <h2 id="dates"></h2>
  <p id="message"></p>

  <!-- SLIDESHOW CONTAINER (required for images to show) -->
  <div id="slideshow"></div>

  <!-- SEND TO SELLER BUTTON -->
  <button id="sendButton" onclick="sendToSeller()">Send to Seller</button>
</div>

<script>
  initPreviewPage();
</script>

</body>
</html>
