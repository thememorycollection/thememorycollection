
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tribute Slideshow</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  button {
  margin-top: 20px;
  padding: 12px 18px;
  background: #f5d28a;
  color: #000;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
}
  img {
    max-width:90%;
    height:auto;
    border-radius:12px;
    box-shadow:0 0 20px rgba(255,255,255,0.2);
  }
  .caption {
    margin-top:12px;
    font-size:1rem;
    opacity:0.8;
  }
</style>

</head>
<body>

<h2>Tribute Slideshow</h2>
<p class="caption">Slideshow content coming soon.</p>

<button id="backToTribute">Back to Tribute</button>

<script>
  // Read the tribute URL from ?return=
  const params = new URLSearchParams(location.search);
  const tributeURL = params.get("return");

  document.getElementById("backToTribute").addEventListener("click", () => {
    if (tributeURL) {
      window.location.href = tributeURL;
    } else {
      history.back();
    }
  });
</script>

</body>
</html>
