<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tribute Slideshow</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="tribute.css">

<style>
  body {
    font-family: system-ui, sans-serif;
    background: linear-gradient(to bottom, #050509, #151520);
    color: #f5f5f5;
    text-align: center;
    padding: 20px;
  }

  h2 {
    margin-bottom: 10px;
  }

  #slideshowContainer {
    position: relative;
    width: 90%;
    max-width: 600px;
    height: 400px;
    margin: 30px auto;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 0 25px rgba(255,255,255,0.15);
  }

  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    object-fit: cover;
    border-radius: 12px;
  }

  .slide.active {
    opacity: 1;
  }

  button {
    margin-top: 20px;
    padding: 12px 18px;
    background: #f5d28a;
    color: #000;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
  }
</style>
</head>

<body>

<h2>Tribute Slideshow</h2>
<p class="caption">Photos gently cross‑fading every few seconds.</p>

<div id="slideshowContainer"></div>

<button id="backToTribute">Back to Tribute</button>

<script>
  // Read return URL
  const params = new URLSearchParams(location.search);
  const tributeURL = params.get("return");

  document.getElementById("backToTribute").addEventListener("click", () => {
    if (tributeURL) {
      window.location.href = tributeURL;
    } else {
      history.back();
    }
  });

  // Load slideshow images from localStorage
  const images = JSON.parse(localStorage.getItem("slideshowImages") || "[]");

  const container = document.getElementById("slideshowContainer");

  if (images.length === 0) {
    container.innerHTML = "<p>No slideshow images found.</p>";
  } else {
    images.forEach((src, i) => {
      const img = document.createElement("img");
      img.src = src;
      img.className = "slide" + (i === 0 ? " active" : "");
      container.appendChild(img);
    });

    let index = 0;
    const slides = document.querySelectorAll(".slide");

    setInterval(() => {
      slides[index].classList.remove("active");
      index = (index + 1) % slides.length;
      slides[index].classList.add("active");
    }, 5000);
  }
</script>

</body>
</html>
