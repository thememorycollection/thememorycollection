<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Returning Hearts – Tribute Page Creator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">


</head>
<body>

<h1>Returning Hearts – Tribute Page Creator</h1>

<label>Name of Loved One</label>
<input id="nameInput" placeholder="e.g., Duncan McGregor">

<label>Dates</label>
<input id="datesInput" placeholder="e.g., 1948 – 2026">

<label>Message</label>
<textarea id="messageInput" rows="4" placeholder="A short message or tribute..."></textarea>

<label>Photo (optional)</label>
<input type="file" id="photoInput" accept="image/*">

<button onclick="generateTribute()">Generate Tribute Page</button>

<h2>Generated Tribute Page HTML</h2>
<div id="output"></div>

<button onclick="downloadHTML()">Download Tribute Page</button>

<script>
let photoDataUrl = "";

document.getElementById("photoInput").addEventListener("change", function(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    photoDataUrl = e.target.result;
  };
  reader.readAsDataURL(file);
});

function generateTribute() {
  const name = document.getElementById("nameInput").value;
  const dates = document.getElementById("datesInput").value;
  const message = document.getElementById("messageInput").value;

  const hasPhoto = photoDataUrl !== "";

  const tributeHTML = `
${generateTemplate(name, dates, message, hasPhoto ? photoDataUrl : null)}
  `.trim();

  document.getElementById("output").textContent = tributeHTML;

  window.generatedHTML = tributeHTML;
}

function downloadHTML() {
  if (!window.generatedHTML) return alert("Generate the page first!");

  const blob = new Blob([window.generatedHTML], { type: "text/html" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "tribute-page.html";
  a.click();

  URL.revokeObjectURL(url);
}

function generateTemplate(name, dates, message, photo) {
  return `
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>In Loving Memory of ${name}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<style>
  body {
    font-family: system-ui, sans-serif;
    background: linear-gradient(to bottom, #050509, #151520);
    color: #f5f5f5;
    padding: 20px;
    max-width: 720px;
    margin: auto;
  }
  .header-label {
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: #b3b3c2;
    font-size: 0.8rem;
    text-align: center;
  }
  h1 {
    font-family: "Playfair Display", serif;
    text-align: center;
    margin: 6px 0;
  }
  .dates {
    text-align: center;
    color: #b3b3c2;
    letter-spacing: 0.16em;
  }
  .portrait {
    margin: 30px auto;
    width: 260px;
    height: 340px;
    border-radius: 999px;
    overflow: hidden;
    box-shadow: 0 18px 40px rgba(0,0,0,0.9);
  }
  .portrait img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .quote {
    font-size: 1rem;
    line-height: 1.7;
    margin-top: 20px;
    text-align: center;
  }
  .candle {
    margin: 40px auto;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, #fbe3a4, #f5a623 55%, transparent 70%);
    border-radius: 999px;
    box-shadow: 0 0 25px rgba(245,210,138,0.8);
    position: relative;
  }
  .flame {
    width: 18px;
    height: 32px;
    background: linear-gradient(to bottom, #fff, #f5a623 70%, #f08a1a);
    border-radius: 50%;
    position: absolute;
    top: 10px;
    left: 31px;
    animation: flicker 3s infinite ease-in-out;
  }
  @keyframes flicker {
    0% { transform: translateX(0); }
    50% { transform: translateX(1px); }
    100% { transform: translateX(0); }
  }
</style>
</head>
<body>

<div class="header-label">In loving memory of</div>
<h1>${name}</h1>
<div class="dates">${dates}</div>

<div class="portrait">
  ${photo ? `<img src="${photo}" alt="Portrait of ${name}">` : ""}
</div>

<div class="quote">“${message}”</div>

<div class="candle">
  <div class="flame"></div>
</div>

</body>
</html>
  `;
}
</script>

</body>
</html>
