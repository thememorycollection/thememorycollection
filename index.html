<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TheMemoryCollection – Tribute Page Creator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="tribute.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>


</head>
<body>

<h1>TheMemoryCollection – Tribute Page Creator</h1>

<!-- FORM SECTION -->
<div id="formSection">

  <label>Name of Loved One</label>
  <input id="nameInput" placeholder="e.g., Doris day">

  <label>Dates</label>
  <input id="datesInput" placeholder="e.g., 1948 – 2026">

  <label>Message</label>
  <textarea id="messageInput" rows="4" placeholder="She was the heartbeat of our home—bright, creative, compassionate. A daughter who danced through life with joy and fierce love. She could light up a room with a look, a smile, a small act of kindness. Her laugh echoed through our halls; her spirit, etched into everything she touched. Whether singing aloud, offering a thoughtful gift, or simply sitting beside you in silence, she made you feel seen. Losing her feels unimaginable. But this tribute isn’t about absence—it’s about presence. Her light remains in our memories, our dreams, our hearts. Every flower she loved, every song she hummed, every cause she cared about… these are the ways we remember her. And in remembering, we honour her. We carry her forward, not only with sadness but with deep gratitude that she was ours—even if only for a while."></textarea>

  <label>Photo (optional)</label>
  <input type="file" id="photoInput" accept="image/*">

  <label>Password (optional)</label>
  <input id="passwordInput" type="password" placeholder="Choose a password">

  <button onclick="generateTribute()">Generate Tribute Page</button>
</div>

<!-- PREVIEW SECTION -->
<div id="previewSection">
  <h2>Preview of Tribute Page</h2>
  <iframe id="previewFrame"></iframe>

  <button onclick="goBack()">Back to Form</button>
  <button onclick="downloadHTML()">Buy Now</button>
</div>

<script>
function wrapEncryptedPage(html, password) {
  const encrypted = CryptoJS.AES.encrypt(html, password).toString();
  </script>

<script src="js/script.js"></script>
</body>
</html>
